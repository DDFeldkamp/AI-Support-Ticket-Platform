apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: ticket-ingress
spec:
  rules:
    - host: tickets.local
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: ticket-frontend
                port:
                  number: 80
          - path: /api
            pathType: Prefix
            backend:
              service:
                name: ticket-backend
                port:
                  number: 8080
