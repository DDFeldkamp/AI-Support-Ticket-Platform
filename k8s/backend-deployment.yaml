apiVersion: apps/v1
kind: Deployment
metadata:
  name: ticket-backend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: ticket-backend
  template:
    metadata:
      labels:
        app: ticket-backend
    spec:
      containers:
        - name: backend
          image: ticket-backend:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8080
          env:
            - name: SPRING_DATASOURCE_URL
              value: jdbc:postgresql://postgres:5432/tickets
            - name: SPRING_DATASOURCE_USERNAME
              valueFrom: {secretKeyRef: {name: ticket-secrets, key: postgres-user}}
            - name: SPRING_DATASOURCE_PASSWORD
              valueFrom: {secretKeyRef: {name: ticket-secrets, key: postgres-password}}
            - name: SPRING_DATA_MONGODB_URI
              value: mongodb://mongo:27017/tickets_ai
            - name: REDIS_HOST
              value: redis
---
apiVersion: v1
kind: Service
metadata:
  name: ticket-backend
spec:
  selector:
    app: ticket-backend
  ports:
    - port: 8080
      targetPort: 8080
